services:
  uploader:
    image: ghcr.io/magnusakselvoll/enable-banking-firefly-iii-uploader:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EnableBankingUploader__EnableBankingApplicationId: "${EB_APPLICATION_ID}"
      EnableBankingUploader__EnableBankingPrivateKeyPath: "/run/secrets/eb_private_key"
      EnableBankingUploader__FireflyIiiUrl: "${FIREFLY_URL}"
      EnableBankingUploader__FireflyIiiToken: "${FIREFLY_TOKEN}"
      EnableBankingUploader__PublicBaseUrl: "${PUBLIC_BASE_URL}"
      EnableBankingUploader__Schedule: "${SCHEDULE:-0 18 * * *}"
      # EnableBankingUploader__WhatIf: "false"  # true = preview only; if FireflyIiiUrl unset, runs fully offline (no Firefly contact)
      # SessionStorePath defaults to /data/sessions (mapped to the sessions volume below).
      # WebListenUrl defaults to http://0.0.0.0:8080; override if needed.
    volumes:
      - ./secrets/enablebanking.pem:/run/secrets/eb_private_key:ro
      - sessions:/data/sessions
    networks:
      - firefly_iii

volumes:
  sessions:

networks:
  firefly_iii:
    external: true
