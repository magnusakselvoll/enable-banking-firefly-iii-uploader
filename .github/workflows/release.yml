name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version from git tag
        id: tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push versioned image
        run: |
          dotnet publish src/EnableBankingUploader.Cli \
            -c Release \
            /t:PublishContainer \
            /p:ContainerRegistry=ghcr.io \
            /p:ContainerImageTag=${{ steps.tags.outputs.version }} \
            /p:Version=${{ steps.tags.outputs.version }}

      - name: Push latest image
        run: |
          dotnet publish src/EnableBankingUploader.Cli \
            -c Release \
            /t:PublishContainer \
            /p:ContainerRegistry=ghcr.io \
            /p:ContainerImageTag=latest \
            /p:Version=${{ steps.tags.outputs.version }}

      - name: Add Docker image reference to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.tags.outputs.version }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          BODY="$(gh release view "$TAG" --json body -q .body)"
          if printf '%s' "$BODY" | grep -qF '## Docker image'; then
            echo 'Docker image section already present; skipping.'
            exit 0
          fi
          {
            printf '%s\n\n' "$BODY"
            printf '## Docker image\n\n'
            printf '```\n'
            printf 'docker pull %s:%s\n' "$IMAGE" "$VERSION"
            printf '```\n\n'
            printf 'Also published as `%s:latest`.\n' "$IMAGE"
          } > release-notes.md
          gh release edit "$TAG" --notes-file release-notes.md
